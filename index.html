<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SN-79 / MVTRX / GenTRX Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentation for the Subnet 79.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Docsify base theme (light, neutral). our override below reskins it. -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="/docs-theme.css" />
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'MVTRX',
      repo: 'taos-im/sn-79',
      homepage: 'README.md',
      loadSidebar: true,
      relativePath: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        placeholder: 'Search',
        noData: 'No results',
        depth: 3,
        namespace: 'mvtrx-docs-v1',
        maxAge: 3600000,
      },
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <!-- Mermaid: renders ```mermaid fenced blocks into diagrams.
       GitHub renders these natively too, so markdown stays portable. -->
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'neutral' });</script>
</body>
</html>
